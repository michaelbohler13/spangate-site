<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpanGate Technology — Configure. Monitor. Track.</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ── HERO ── */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#lineCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  width: 100%;
  max-width: 900px;
  padding: 30px 40px 0;
}
.hero-glow {
  position: absolute;
  top: 30%; left: 50%;
  transform: translate(-50%, -50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(33,139,255,.06) 0%, transparent 65%);
  pointer-events: none;
  z-index: 1;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--page-bg);
  color:#e6edf3;
  overflow-x:hidden;
  padding-top:0;
}

/* ─── STRING GRID BACKGROUND (same as ConfigWizard) ─── */
body::before{display:none;}

/* ─── NAV ─── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;
  background:rgba(13,17,23,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(33,139,255,.1);
}

.nav-logo img{height:32px;width:auto;}

.nav-links{display:flex;gap:32px;}
.nav-links a{font-size:13px;color:rgba(230,237,243,.45);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:#58a6ff;}
.nav-r{display:flex;align-items:center;gap:12px;}

.saber-toggle{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:5px 14px;
  cursor:pointer;user-select:none;
  font-size:13px;color:rgba(230,237,243,.5);
  transition:all .2s;
}
.saber-toggle:hover{border-color:rgba(255,255,255,.15);color:#e6edf3;}
.saber-icon{
  width:16px;height:16px;flex-shrink:0;
  display:inline-block;
}
.nav-cta{
  background:linear-gradient(135deg,#238be0,#1a6fbf);
  color:#fff;border:none;border-radius:8px;
  padding:8px 20px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  transition:opacity .2s;
}
.nav-cta:hover{opacity:.85;}

/* ─── HERO ─── */
.hero-glow{
  position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse,rgba(33,139,255,.08) 0%,transparent 65%);
  pointer-events:none;
}
.hero-h1{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:28px;
}
.hero-h1 span{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:clamp(68px,8.5vw,108px);
  line-height:.88;letter-spacing:-3px;
  display:block;
}
.w1{color:#e6edf3;}
.w2{
  background:linear-gradient(90deg,#00d4ff,#3d6aff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.w3{
  background:linear-gradient(90deg,#3d6aff,#8b3fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{
  font-size:17px;font-weight:300;
  color:rgba(230,237,243,.45);
  max-width:560px;line-height:1.7;margin-bottom:40px;
}
.hero-ctas{
  display:flex;align-items:center;gap:16px;
  margin-bottom:48px;flex-wrap:wrap;justify-content:center;
}
.btn-primary{
  background:linear-gradient(135deg,#238be0,#1a6fbf);
  color:#fff;border:none;border-radius:8px;
  padding:14px 36px;font-size:15px;font-weight:500;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  transition:opacity .2s,transform .15s;
}
.btn-primary:hover{opacity:.85;transform:translateY(-2px);}
.btn-secondary{
  background:transparent;color:rgba(230,237,243,.6);
  border:1px solid rgba(255,255,255,.12);border-radius:8px;
  padding:14px 36px;font-size:15px;font-weight:400;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .2s;
}
.btn-secondary:hover{border-color:#58a6ff;color:#58a6ff;}
.trust{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.ti{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(230,237,243,.2);}
.td{width:4px;height:4px;border-radius:50%;background:#58a6ff;opacity:.4;flex-shrink:0;}

/* ─── STAT BAR ─── */
.statbar{
  position:relative;z-index:1;
  border-top:1px solid rgba(33,139,255,.1);
  border-bottom:1px solid rgba(33,139,255,.1);
  padding:28px 60px;
  display:flex;justify-content:center;gap:80px;flex-wrap:wrap;
}
.stat{text-align:center;}
.sv{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;
  background:linear-gradient(135deg,#58a6ff,#238be0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sl{font-size:12px;color:rgba(230,237,243,.3);margin-top:3px;letter-spacing:.5px;}

/* ─── STATEMENT ─── */
.statement{
  position:relative;z-index:1;
  padding:120px 60px;text-align:center;
}
.statement-inner{max-width:860px;margin:0 auto;}
.ey{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#58a6ff;font-weight:500;margin-bottom:16px;display:block;}
.st-h{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(38px,5vw,68px);line-height:.95;
  color:#e6edf3;margin-bottom:22px;
}
.st-h span{color:rgba(230,237,243,.55);}
.st-p{font-size:17px;font-weight:300;color:rgba(230,237,243,.4);line-height:1.75;max-width:680px;margin:0 auto;}

/* ─── PRODUCTS ─── */
.products{position:relative;z-index:1;padding:100px 60px;}
.products-inner{max-width:1200px;margin:0 auto;}
.prod-header{margin-bottom:60px;}
.prod-header h2{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(40px,5vw,64px);line-height:.93;color:#e6edf3;margin-bottom:14px;
}
.prod-header h2 span{color:rgba(230,237,243,.55);}
.prod-header p{font-size:16px;font-weight:300;color:rgba(230,237,243,.4);max-width:520px;line-height:1.7;}

.prod-block{
  background:rgba(22,27,34,.85);
  border:1px solid rgba(33,139,255,.1);
  border-radius:16px;overflow:hidden;
  margin-bottom:20px;
  transition:border-color .3s;
}
.prod-block:hover{border-color:rgba(33,139,255,.25);}
.cw-block{border-top:2px solid #238be0;}
.nm-block{border-top:2px solid #00c9a7;}
.at-block{border-top:2px solid #f5a623;}

.prod-head{
  padding:32px 40px 24px;
  border-bottom:1px solid rgba(33,139,255,.08);
  display:flex;align-items:flex-start;gap:18px;
}
.prod-num{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:48px;line-height:1;color:rgba(230,237,243,.05);flex-shrink:0;
}
.prod-head-text{flex:1;}
.prod-badge{
  display:inline-block;font-size:10px;font-weight:600;letter-spacing:1px;
  padding:3px 12px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;
}
.badge-live{background:rgba(0,230,118,.08);color:#00e676;border:1px solid rgba(0,230,118,.2);}
.badge-build{background:rgba(0,201,167,.08);color:#00c9a7;border:1px solid rgba(0,201,167,.2);}
.badge-soon{background:rgba(245,166,35,.08);color:#f5a623;border:1px solid rgba(245,166,35,.2);}
.prod-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:38px;line-height:1;color:#e6edf3;letter-spacing:-1px;margin-bottom:8px;
}
.prod-desc{font-size:14px;color:rgba(230,237,243,.35);line-height:1.7;max-width:700px;}

.prod-info{
  padding:28px 32px;
  border-right:1px solid rgba(33,139,255,.08);
  display:flex;flex-direction:column;justify-content:space-between;
}
.feats{list-style:none;flex:1;margin-bottom:20px;}
.feats li{
  font-size:13px;color:rgba(230,237,243,.4);
  padding:7px 0;border-bottom:1px solid rgba(33,139,255,.06);
  display:flex;align-items:center;gap:10px;
}
.feats li:last-child{border:none;}
.fc{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700;}
.fc-cw{background:rgba(35,139,224,.15);color:#238be0;}
.fc-nm{background:rgba(0,201,167,.15);color:#00c9a7;}
.fc-at{background:rgba(245,166,35,.15);color:#f5a623;}
.price{font-size:12px;color:rgba(230,237,243,.2);padding-top:14px;border-top:1px solid rgba(33,139,255,.06);}
.price strong{font-size:20px;color:#e6edf3;font-weight:600;font-family:'Barlow Condensed',sans-serif;}

.prod-screen{
  background:#010409;
  padding:22px 26px 0;
  position:relative;overflow:hidden;min-height:240px;
}
.prod-screen::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:50px;
  background:linear-gradient(transparent,#010409);
}
.sbar{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.04);}
.sd{width:10px;height:10px;border-radius:50%;}
.sdr{background:#ff5f57;}.sdy{background:#ffbd2e;}.sdg{background:#28ca41;}
.stitle{font-size:11px;color:rgba(255,255,255,.15);margin-left:auto;letter-spacing:.5px;font-family:'Plus Jakarta Sans',sans-serif;}
.code{font-family:'Courier New',monospace;font-size:12px;line-height:2;white-space:pre;}
.cm{color:#3d5270;}.cv{color:#7dd3b0;}.cs{color:#e8a44a;}
.cw-code .ck{color:#58a6ff;}
.nm-code .ck{color:#2dcaaa;}
.at-code .ck{color:#f5a623;}

/* ─── PRICING ─── */
.pricing{position:relative;z-index:1;padding:100px 60px;}
.pricing-inner{max-width:1200px;margin:0 auto;}
.sec-h{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(38px,5vw,60px);line-height:.93;color:#e6edf3;margin-bottom:14px;}
.sec-sub{font-size:16px;font-weight:300;color:rgba(230,237,243,.35);max-width:540px;line-height:1.7;}
.ptable-wrap{margin-top:48px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;border:1px solid rgba(33,139,255,.12);border-radius:14px;overflow:hidden;}
thead tr{background:rgba(22,27,34,.9);}
th{padding:20px 24px;text-align:left;border-bottom:1px solid rgba(33,139,255,.1);font-size:13px;font-weight:400;color:#e6edf3;}
th.tc{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(230,237,243,.2);}
th.tcw{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;border-top:2px solid #238be0;}
th.tnm{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;border-top:2px solid #00c9a7;}
th.tat{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;border-top:2px solid #f5a623;}
td{padding:18px 24px;border-bottom:1px solid rgba(33,139,255,.06);font-size:13px;color:rgba(230,237,243,.35);vertical-align:top;}
tr:last-child td{border:none;}
tbody tr:hover td{background:rgba(255,255,255,.01);}
.tt{font-size:13px;font-weight:500;color:#e6edf3;display:block;margin-bottom:2px;}
.tp{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;color:#e6edf3;display:block;line-height:1.1;}
.tper{font-size:11px;color:rgba(230,237,243,.2);}
.tnote{font-size:11px;color:rgba(230,237,243,.2);margin-top:4px;display:block;}
.tdash{color:rgba(230,237,243,.1);font-size:20px;}

/* ─── FAQ ─── */
.faq{position:relative;z-index:1;padding:100px 60px;}
.faq-inner{max-width:800px;margin:48px auto 0;}
.fi{border-bottom:1px solid rgba(33,139,255,.1);padding:22px 0;cursor:pointer;}
.fi:first-child{border-top:1px solid rgba(33,139,255,.1);}
.fq{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:500;color:#e6edf3;user-select:none;gap:16px;transition:color .2s;}
.fi:hover .fq{color:#58a6ff;}
.fplus{font-size:22px;color:rgba(230,237,243,.2);transition:transform .3s,color .3s;flex-shrink:0;}
.fi.open .fplus{transform:rotate(45deg);color:#58a6ff;}
.fa{font-size:14px;color:rgba(230,237,243,.38);line-height:1.85;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;}
.fi.open .fa{max-height:260px;padding-top:14px;}

/* ─── CTA BAND ─── */
.ctaband{
  position:relative;z-index:1;
  padding:120px 60px;text-align:center;
  border-top:1px solid rgba(33,139,255,.1);
  border-bottom:1px solid rgba(33,139,255,.1);
}
.ctaband::before{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:800px;height:400px;
  background:radial-gradient(ellipse,rgba(33,139,255,.07) 0%,transparent 65%);
  pointer-events:none;
}
.cb-h{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(68px,8.5vw,108px);line-height:.9;
  color:#e6edf3;margin-bottom:16px;letter-spacing:-2px;position:relative;
}
.cb-h .g{
  background:linear-gradient(95deg,#58a6ff,#238be0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cb-sub{font-size:17px;font-weight:300;color:rgba(230,237,243,.35);margin-bottom:36px;position:relative;}
.cb-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;}
.btn-ghost{
  background:transparent;color:rgba(230,237,243,.5);
  border:1px solid rgba(255,255,255,.12);border-radius:8px;
  padding:14px 36px;font-size:15px;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;
}
.btn-ghost:hover{border-color:#58a6ff;color:#58a6ff;}

/* ─── FOOTER ─── */
footer{
  position:relative;z-index:1;
  border-top:1px solid rgba(33,139,255,.1);
  padding:60px 60px 28px;
}
.fin{max-width:1200px;margin:0 auto;}
.ftop{display:flex;justify-content:space-between;align-items:flex-start;gap:48px;margin-bottom:44px;flex-wrap:wrap;}
.fbrand img{height:40px;width:auto;margin-bottom:12px;display:block;}
.ftag{font-size:13px;color:rgba(230,237,243,.3);margin-bottom:10px;}
.femail{font-size:13px;color:#58a6ff;text-decoration:none;}
.femail:hover{opacity:.7;}
.fcols{display:flex;gap:48px;flex-wrap:wrap;}
.fcols{display:flex;gap:48px;flex-wrap:wrap;}
.fcol h4{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(230,237,243,.15);font-weight:400;margin-bottom:12px;}
.fcol a{display:block;font-size:13px;color:rgba(230,237,243,.3);text-decoration:none;margin-bottom:8px;transition:color .2s;}
.fcol a:hover{color:#58a6ff;}
.fbot{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid rgba(33,139,255,.08);flex-wrap:wrap;gap:10px;}
.fcopy{font-size:11px;color:rgba(230,237,243,.15);}
.easter{font-family:'Courier New',monospace;font-size:11px;color:rgba(33,139,255,.3);letter-spacing:2px;cursor:default;transition:color .3s;}
.easter:hover{color:#58a6ff;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.nav-icon {
  height: 36px;
  width: auto;
  flex-shrink: 0;
}
.nav-wordmark {
  height: 28px;
  width: auto;
}

  position: absolute;

body, * {
  font-family: 'Plus Jakarta Sans', sans-serif;
}

}

}

<script>
// SCROLL REVEAL
const revealElements = document.querySelectorAll('.reveal');
const revealOnScroll = () => {
  revealElements.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight * 0.88) {
      el.classList.add('visible');
    }
  });
};
window.addEventListener('scroll', revealOnScroll);
window.addEventListener('load', revealOnScroll);

// FAQ TOGGLE
function toggleFaq(element) {
  element.classList.toggle('open');
}

// THEME TOGGLE
const themeToggle = document.getElementById('themeToggle');
const body = document.body;
const saberLabel = document.getElementById('saberLabel');

themeToggle.addEventListener('click', () => {
  body.classList.toggle('light');
  if (body.classList.contains('light')) {
    saberLabel.textContent = 'LIGHT SIDE';
  } else {
    saberLabel.textContent = 'DARK SIDE';
  }
});

// CANVAS BACKGROUND LOGIC
const canvas = document.getElementById('lineCanvas');
const ctx = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

window.addEventListener('resize', function() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
});

var lines = [];
var maxLines = 15;

function makeLine() {
  var isLeft = Math.random() < 0.5;
  var sy = Math.random() * H;
  var sx = isLeft ? -20 : W + 20;
  var ey = Math.random() * H;
  var ex = isLeft ? W + 20 : -20;

  var cp1x = sx + (ex - sx) * 0.25 + (Math.random() * 200 - 100);
  var cp1y = sy + (Math.random() * 300 - 150);
  var cp2x = sx + (ex - sx) * 0.75 + (Math.random() * 200 - 100);
  var cp2y = ey + (Math.random() * 300 - 150);

  var colors = [
    [54, 150, 255],  // Cyan/blue
    [100, 80, 255],  // Purple
    [64, 224, 208],  // Turquoise
    [30, 144, 255]   // DodgerBlue
  ];
  var col = colors[Math.floor(Math.random() * colors.length)];

  return {
    sx: sx, sy: sy,
    ex: ex, ey: ey,
    cp1x: cp1x, cp1y: cp1y,
    cp2x: cp2x, cp2y: cp2y,
    age: 0,
    maxAge: 200 + Math.random() * 150,
    width: 0.5 + Math.random() * 1.2,
    alpha: 0.08 + Math.random() * 0.12,
    col: col,
    dotPos: Math.random(),
    dotSpeed: 0.002 + Math.random() * 0.003
  };
}

for (var i = 0; i < maxLines; i++) {
  lines.push(makeLine());
}

function bezier(t, p0, p1, p2, p3) {
  var cX = 3 * (p1 - p0), bX = 3 * (p2 - p1) - cX, aX = p3 - p0 - cX - bX;
  return aX*t*t*t + bX*t*t + cX*t + p0;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  
  lines.forEach(function(l) {
    l.age++;
    if (l.age > l.maxAge) {
      Object.assign(l, makeLine());
      l.age = 0;
    }
    
    var p = l.age / l.maxAge;
    var fade = p < 0.1 ? p/0.1 : p > 0.9 ? (1-p)/0.1 : 1;
    var a = l.alpha * fade;
    
    // Adjusted line visibility for light mode
    if (document.body.classList.contains('light')) {
      a *= 0.6; 
    }
    
    var r = l.col[0], g = l.col[1], b = l.col[2];

    ctx.beginPath();
    ctx.moveTo(l.sx, l.sy);
    ctx.bezierCurveTo(l.cp1x, l.cp1y, l.cp2x, l.cp2y, l.ex, l.ey);
    ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
    ctx.lineWidth = l.width;
    ctx.stroke();

    l.dotPos += l.dotSpeed;
    if (l.dotPos > 1) l.dotPos = 0;
    
    var t = l.dotPos;
    var dx = bezier(t, l.sx, l.cp1x, l.cp2x, l.ex);
    var dy = bezier(t, l.sy, l.cp1y, l.cp2y, l.ey);

    ctx.beginPath();
    ctx.arc(dx, dy, l.width * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (a * 2 > 1 ? 1 : a * 2) + ')';
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>
