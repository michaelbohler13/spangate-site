name: Build & Push Agent Docker Image

on:
  push:
    branches: [main]
    paths:
      - "netmonitor-agent/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(cat netmonitor-agent/VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./netmonitor-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            spangate/netmonitor-agent:latest
            spangate/netmonitor-agent:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
