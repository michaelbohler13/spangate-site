name: Build & Push Agent to Docker Hub

# Rebuilds the image whenever agent code or its Dockerfile changes.
# On the first push you must add two secrets in GitHub:
#   Settings → Secrets → Actions → New repository secret
#   DOCKERHUB_USERNAME = spangate
#   DOCKERHUB_TOKEN    = <Docker Hub access token>
#
# Create a token at: https://hub.docker.com/settings/security

on:
  push:
    branches: [main]
    paths:
      - "netmonitor-agent/**"
      - ".github/workflows/docker-publish.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU lets buildx compile for foreign architectures (Pi ARM, etc.)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx is the multi-arch build driver
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build for:
      #   linux/amd64   — standard x86-64 (Intel/AMD PCs, cloud VMs)
      #   linux/arm64   — Raspberry Pi 4/5 (64-bit), Apple Silicon Macs
      #   linux/arm/v7  — Raspberry Pi 2/3 (32-bit Raspbian)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./netmonitor-agent
          file: ./netmonitor-agent/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            spangate/netmonitor-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
