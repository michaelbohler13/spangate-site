name: Build & Push Agent Image

# Runs whenever agent source code changes on main.
# Builds for linux/amd64 (dev/test) and linux/arm64 + linux/arm/v7
# (Raspberry Pi 4 / Pi 3) and pushes spangate/netmonitor-agent:latest.

on:
  push:
    branches:
      - main
    paths:
      - "netmonitor-agent/**"

  # Allow a manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU — enables cross-compilation for ARM targets ──────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Buildx — multi-platform builder ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ───────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Read version from VERSION file ────────────────────────────────────
      - name: Read agent version
        id: version
        run: echo "version=$(cat netmonitor-agent/VERSION)" >> $GITHUB_OUTPUT

      # ── 6. Build & push ───────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./netmonitor-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-agent:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
