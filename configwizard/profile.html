<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — NetConfig</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2333;
    --border:#30363d; --border-bright:#484f58;
    --text:#e6edf3; --text-muted:#8b949e; --text-dim:#6e7681;
    --accent:#58a6ff; --success:#3fb950; --danger:#f85149; --warning:#d29922;
    --mono:'JetBrains Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d1117;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding-top:44px;}

  .site-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:44px;display:flex;align-items:center;padding:0 1.5rem;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(13,17,23,0.82);border-bottom:0.5px solid rgba(255,255,255,0.06);gap:1rem;}
  .site-nav-logo{font-family:var(--mono);font-size:0.88rem;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:7px;letter-spacing:-0.01em;}
  .site-nav-logo-mark{width:20px;height:20px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:#000;font-weight:700;}
  .site-nav-links{display:flex;gap:1.5rem;list-style:none;margin-left:1rem;}
  .site-nav-links a{font-size:0.75rem;color:var(--text-muted);text-decoration:none;font-family:var(--mono);transition:color 0.15s;}
  .site-nav-links a:hover,.site-nav-links a.active{color:var(--text);}
  .site-nav-crumb{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--text-dim);font-family:var(--mono);}
  .site-nav-crumb a{color:var(--text-muted);text-decoration:none;transition:color 0.15s;}
  .site-nav-crumb a:hover{color:var(--text);}
  .site-nav-spacer{flex:1;}
  .site-nav-right{display:flex;align-items:center;gap:10px;}
  .site-nav-btn{font-size:0.72rem;font-family:var(--mono);padding:4px 12px;border-radius:980px;text-decoration:none;transition:all 0.15s;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:none;color:var(--text-muted);}
  .site-nav-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
  .site-nav-btn.primary{background:var(--accent);color:#000;font-weight:600;border-color:var(--accent);}
  .site-nav-btn.primary:hover{opacity:0.85;}
  .site-nav-divider{width:0.5px;height:16px;background:rgba(255,255,255,0.1);}
  @media(max-width:600px){.site-nav-links{display:none;}.site-nav-crumb{display:none;}}

  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50;display:none;}
  .nav-brand{font-family:var(--mono);font-weight:600;font-size:1rem;color:var(--text);text-decoration:none;}
  .nav-brand span{color:var(--accent);}
  .nav-crumb{font-size:0.78rem;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
  .nav-crumb a{color:var(--text-muted);text-decoration:none;}
  .nav-crumb a:hover{color:var(--text);}
  .nav-spacer{flex:1;}
  .btn{padding:6px 14px;border-radius:6px;font-size:0.75rem;font-family:var(--mono);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);}
  .btn:hover{border-color:var(--border-bright);color:var(--text);}
  .btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
  .btn-primary:hover{opacity:0.85;background:var(--accent);}
  .btn-success{background:var(--success);color:#000;border-color:var(--success);font-weight:600;}
  .btn-danger{color:var(--danger);border-color:transparent;}
  .btn-danger:hover{border-color:var(--danger);background:rgba(248,81,73,0.08);}

  .page{max-width:1000px;margin:0 auto;padding:2rem;}

  .profile-hero{display:flex;align-items:flex-start;gap:1.25rem;margin-bottom:2rem;}
  .hero-icon{width:52px;height:52px;border-radius:10px;font-family:var(--mono);font-size:0.82rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .hero-icon.aruba{background:rgba(255,107,43,0.15);color:#ff6b2b;}
  .hero-icon.cisco{background:rgba(27,160,215,0.15);color:#1ba0d7;}
  .hero-icon.juniper{background:rgba(132,195,65,0.15);color:#84c341;}
  .hero-name{font-size:1.4rem;font-weight:600;}
  .hero-meta{font-size:0.8rem;color:var(--text-muted);margin-top:3px;font-family:var(--mono);}
  .hero-actions{margin-left:auto;display:flex;gap:8px;flex-shrink:0;}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem;}
  .info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;}
  .info-card-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);font-weight:600;margin-bottom:0.75rem;}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.8rem;}
  .info-row:last-child{border-bottom:none;}
  .info-key{color:var(--text-muted);}
  .info-val{font-family:var(--mono);font-size:0.75rem;color:var(--text);text-align:right;max-width:200px;overflow:hidden;text-overflow:ellipsis;}

  /* Version history */
  .section-title{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
  .version-list{display:flex;flex-direction:column;gap:8px;}
  .version-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;transition:border-color 0.15s;}
  .version-card:hover{border-color:var(--border-bright);}
  .version-card.current{border-color:var(--accent);}
  .version-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .version-num{font-family:var(--mono);font-size:0.72rem;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--text-muted);}
  .version-num.current-badge{background:rgba(88,166,255,0.15);color:var(--accent);}
  .version-label{font-size:0.85rem;font-weight:500;flex:1;}
  .version-time{font-size:0.7rem;color:var(--text-dim);font-family:var(--mono);}
  .version-diff{display:flex;gap:8px;font-size:0.7rem;font-family:var(--mono);}
  .diff-add{color:var(--success);}
  .diff-rem{color:var(--danger);}
  .version-actions{display:flex;gap:6px;margin-top:8px;}

  /* Config preview */
  .config-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:0.75rem;}
  .config-block-header{padding:8px 1rem;border-bottom:1px solid var(--border);font-size:0.7rem;color:var(--text-dim);font-family:var(--mono);display:flex;justify-content:space-between;}
  .config-block pre{padding:1rem;font-family:var(--mono);font-size:0.75rem;line-height:1.7;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;color:var(--text-muted);}
  .config-block pre .c-comment{color:#6a737d;}
  .config-block pre .c-keyword{color:#ff7b72;}
  .config-block pre .c-ip{color:#ffa657;}
  .config-block pre .c-string{color:#a5d6ff;}

  /* Compare */
  .compare-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;font-size:0.78rem;color:var(--text-muted);}
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .compare-pane{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .compare-pane-header{padding:8px 1rem;border-bottom:1px solid var(--border);font-size:0.72rem;color:var(--text-dim);font-family:var(--mono);display:flex;justify-content:space-between;}
  .compare-pane pre{padding:1rem;font-family:var(--mono);font-size:0.72rem;line-height:1.65;white-space:pre-wrap;word-break:break-all;max-height:420px;overflow-y:auto;}
  .line-add{color:var(--success);display:block;}
  .line-rem{color:var(--danger);display:block;text-decoration:line-through;opacity:0.65;}

  #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface2);border:1px solid var(--border-bright);color:var(--text);font-family:var(--mono);font-size:0.75rem;padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:999;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .empty-versions{text-align:center;padding:2rem;color:var(--text-muted);font-size:0.82rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:700px){.info-grid{grid-template-columns:1fr;}.compare-grid{grid-template-columns:1fr;}.hero-actions{flex-wrap:wrap;}}
</style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="site-nav-logo">
    <div class="site-nav-logo-mark">▸</div>
    NetConfig
  </a>
  <div class="site-nav-crumb">
    <span>/</span>
    <a href="dashboard.html">Dashboard</a>
    <span>/</span>
    <span id="navProfileName" style="color:var(--text);">Profile</span>
  </div>
  <div class="site-nav-spacer"></div>
  <div class="site-nav-right">
    <a href="wizard.html" class="site-nav-btn primary" id="openWizardBtn">⚙ Open in Wizard</a>
    <div class="site-nav-divider"></div>
    <a href="dashboard.html" class="site-nav-btn">← Dashboard</a>
  </div>
</nav>

<nav style="display:none;">
  <a href="index.html" class="nav-brand"><span>▸</span> NetConfig</a>
  <div class="nav-crumb">
    <span>/</span>
    <a href="dashboard.html">Dashboard</a>
    <span>/</span>
    <span id="navProfileNameOld">Profile</span>
  </div>
  <div class="nav-spacer"></div>
  <button class="btn" id="compareBtnOld" style="display:none;">⬡ Compare Selected</button>
  <a href="#" class="btn btn-primary" id="openWizardBtnOld">⚙ Open in Wizard</a>
</nav>

<div class="page" id="mainPage">
  <div style="text-align:center;padding:4rem;color:var(--text-muted);font-family:var(--mono);">Loading profile…</div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://tiviipaamwvfjvoscnyk.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdmlpcGFhbXd2Zmp2b3NjbnlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDEyODIsImV4cCI6MjA5NDExNzI4Mn0.wBicrt3P5QzQw8sYA87CYxEv--I-KlhnqrsMfcw2irs';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const profileId = new URLSearchParams(window.location.search).get('id');
  let currentUser = null;
  let profile     = null;
  let versions    = [];
  let compareIds  = [];
  let toastTimer  = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    currentUser = session.user;
    if (!profileId) { window.location.href = 'dashboard.html'; return; }
    await loadProfile();
  }

  async function loadProfile() {
    const { data: p, error: pe } = await sb
      .from('profiles')
      .select('*')
      .eq('id', profileId)
      .eq('user_id', currentUser.id)
      .single();

    if (pe || !p) { window.location.href = 'dashboard.html'; return; }
    profile = p;

    const { data: v } = await sb
      .from('versions')
      .select('*')
      .eq('profile_id', profileId)
      .order('version_num', { ascending: false });

    versions = v || [];
    renderPage();
  }

  function renderPage() {
    document.getElementById('navProfileName').textContent = profile.name;
    document.getElementById('openWizardBtn').href = `wizard.html?profile_id=${profile.id}`;

    const vendorAbbr = { aruba:'AOS', cisco:'IOS', juniper:'JNS' }[profile.vendor] || '???';

    document.getElementById('mainPage').innerHTML = `
      <!-- Hero -->
      <div class="profile-hero">
        <div class="hero-icon ${profile.vendor}">${vendorAbbr}</div>
        <div>
          <div class="hero-name">${esc(profile.name)}</div>
          <div class="hero-meta">${esc(profile.hostname||'—')} · ${profile.vendor} · ${versions.length} version${versions.length!==1?'s':''}</div>
        </div>
        <div class="hero-actions">
          <button class="btn btn-danger" onclick="deleteProfile()">✕ Delete</button>
        </div>
      </div>

      <!-- Info -->
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-title">Identity</div>
          ${row('Hostname', profile.hostname)}
          ${row('Vendor', profile.vendor)}
          ${row('Mgmt IP', profile.mgmt_ip)}
          ${row('VLANs', profile.vlan_count)}
          ${row('Created', fmtDate(profile.created_at))}
        </div>
        <div class="info-card">
          <div class="info-card-title">Notes</div>
          <div style="font-size:0.8rem;color:var(--text-muted);line-height:1.6;padding:4px 0;">
            ${esc(profile.notes || 'No notes.')}
          </div>
          ${versions[0]?.config_text ? `
            <div style="margin-top:1rem;">
              <div class="info-card-title">Latest Config</div>
              <div style="font-size:0.72rem;color:var(--text-dim);font-family:var(--mono);">
                ${versions[0].config_text.split('\n').filter(l=>l.trim()).length} lines · v${versions[0].version_num}
              </div>
            </div>` : ''}
        </div>
      </div>

      <!-- Compare bar -->
      <div class="compare-bar" id="compareBar" style="display:none;">
        <span>⬡</span>
        <span id="compareBarText">Select 2 versions below to compare</span>
        <button class="btn btn-primary" id="compareBarBtn" onclick="renderCompare()" style="margin-left:auto;padding:4px 12px;">Compare</button>
        <button class="btn" onclick="compareIds=[];renderPage()" style="padding:4px 8px;">✕</button>
      </div>

      <!-- Version history -->
      <div class="section-title">
        Version History
        <button class="btn" onclick="toggleCompareMode()" id="compareModeBtn">⬡ Compare versions</button>
      </div>
      <div id="compareView" style="display:none;"></div>
      <div class="version-list" id="versionList">
        ${versions.length ? versions.map((v,i) => renderVersionCard(v,i)).join('') : `
          <div class="empty-versions">
            No versions saved yet.<br>Open this profile in the wizard and save a config.
          </div>
        `}
      </div>
    `;
  }

  function renderVersionCard(v, i) {
    const isCurrent = i === 0;
    const isSelected = compareIds.includes(v.id);
    const configLines = (v.config_text||'').split('\n').filter(l=>l.trim()).length;
    return `
      <div class="version-card ${isCurrent?'current':''}" id="vc-${v.id}" style="${isSelected?'border-color:var(--accent);':''}">
        <div class="version-header">
          <span class="version-num ${isCurrent?'current-badge':''}">v${v.version_num}</span>
          <span class="version-label">${esc(v.label||'Saved config')}</span>
          ${isSelected?`<span style="font-size:0.65rem;color:var(--accent);font-family:var(--mono);">● selected</span>`:''}
          <span class="version-time">${fmtTime(new Date(v.created_at).getTime())}</span>
        </div>
        <div class="version-diff">
          ${v.lines_added   ? `<span class="diff-add">+${v.lines_added} lines</span>`   : ''}
          ${v.lines_removed ? `<span class="diff-rem">−${v.lines_removed} lines</span>` : ''}
          <span style="color:var(--text-dim)">${configLines} total lines</span>
        </div>
        <div class="version-actions">
          <button class="btn" onclick="toggleVersionConfig('${v.id}')">
            ${document.getElementById('cfg-'+v.id) ? '▲ Hide' : '▼ Show'} config
          </button>
          <button class="btn" onclick="copyVersionConfig('${v.id}')">⎘ Copy</button>
          <button class="btn" onclick="downloadVersion('${v.id}', ${v.version_num})">⬇ Download</button>
          <button class="btn btn-success" onclick="loadIntoWizard('${v.id}')">↑ Load in Wizard</button>
          ${compareIds.includes(v.id)
            ? `<button class="btn" style="border-color:var(--accent);color:var(--accent);" onclick="toggleCompareSelect('${v.id}')">✓ Selected</button>`
            : `<button class="btn" onclick="toggleCompareSelect('${v.id}')">⬡ Select</button>`}
        </div>
        <div id="cfg-${v.id}" style="display:none;">
          ${renderConfigBlock(v)}
        </div>
      </div>
    `;
  }

  function renderConfigBlock(v) {
    const highlighted = (v.config_text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .split('\n').map(line => {
        if (line.match(/^\s*[!#]/)) return `<span class="c-comment">${line}</span>`;
        if (line.match(/^\s*(hostname|interface|vlan|router|ip route|spanning-tree|aaa|dot1x)/i)) return `<span class="c-keyword">${line}</span>`;
        if (line.match(/\b(\d{1,3}\.){3}\d{1,3}/)) return `<span class="c-ip">${line}</span>`;
        return line;
      }).join('\n');
    const lineCount = (v.config_text||'').split('\n').filter(l=>l.trim()).length;
    return `
      <div class="config-block">
        <div class="config-block-header">
          <span>${esc(profile.hostname||'device')} · v${v.version_num}</span>
          <span>${lineCount} lines</span>
        </div>
        <pre>${highlighted}</pre>
      </div>
    `;
  }

  function renderCompare() {
    if (compareIds.length < 2) return;
    const [v1, v2] = compareIds.map(id => versions.find(v=>v.id===id));
    if (!v1||!v2) return;
    const lines1 = (v1.config_text||'').split('\n');
    const lines2 = (v2.config_text||'').split('\n');
    const set1 = new Set(lines1), set2 = new Set(lines2);

    const renderSide = (lines, other) => lines.map(l => {
      const e = l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (l.trim() && !other.has(l)) return `<span class="line-add">+ ${e||' '}</span>`;
      return e + '\n';
    }).join('');

    document.getElementById('compareView').style.display = 'block';
    document.getElementById('compareView').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <div style="font-size:0.8rem;font-weight:500;">Comparing v${v1.version_num} ↔ v${v2.version_num}</div>
        <button class="btn" onclick="compareIds=[];document.getElementById('compareView').style.display='none';renderVersionList()">✕ Close</button>
      </div>
      <div class="compare-grid">
        <div class="compare-pane">
          <div class="compare-pane-header">
            <span>v${v1.version_num} — ${esc(v1.label)}</span>
            <span>${fmtTime(new Date(v1.created_at).getTime())}</span>
          </div>
          <pre>${renderSide(lines1, set2)}</pre>
        </div>
        <div class="compare-pane">
          <div class="compare-pane-header">
            <span>v${v2.version_num} — ${esc(v2.label)}</span>
            <span>${fmtTime(new Date(v2.created_at).getTime())}</span>
          </div>
          <pre>${renderSide(lines2, set1)}</pre>
        </div>
      </div>
    `;
  }

  function renderVersionList() {
    document.getElementById('versionList').innerHTML =
      versions.length ? versions.map((v,i) => renderVersionCard(v,i)).join('') :
      `<div class="empty-versions">No versions saved yet.</div>`;
  }

  function toggleVersionConfig(vid) {
    const el = document.getElementById('cfg-' + vid);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  function toggleCompareMode() {
    const bar = document.getElementById('compareBar');
    bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
    compareIds = [];
    renderVersionList();
  }

  function toggleCompareSelect(vid) {
    if (compareIds.includes(vid)) {
      compareIds = compareIds.filter(i=>i!==vid);
    } else if (compareIds.length < 2) {
      compareIds.push(vid);
    } else {
      compareIds = [compareIds[1], vid];
    }
    const bar = document.getElementById('compareBar');
    if (bar) {
      bar.style.display = 'flex';
      document.getElementById('compareBarText').textContent =
        compareIds.length === 2 ? 'Ready to compare' : `${compareIds.length} of 2 selected`;
      document.getElementById('compareBarBtn').disabled = compareIds.length < 2;
    }
    renderVersionList();
  }

  function copyVersionConfig(vid) {
    const v = versions.find(v=>v.id===vid);
    if (!v?.config_text) return;
    navigator.clipboard.writeText(v.config_text).then(() => showToast('✓ Copied to clipboard'));
  }

  function downloadVersion(vid, num) {
    const v = versions.find(v=>v.id===vid);
    if (!v?.config_text) return;
    const blob = new Blob([v.config_text], {type:'text/plain'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `${profile.hostname||'device'}_v${num}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function loadIntoWizard(vid) {
    // Store the version ID so wizard.html can pick it up
    sessionStorage.setItem('ncw-load-version', vid);
    sessionStorage.setItem('ncw-profile-id', profileId);
    window.location.href = `wizard.html?profile_id=${profileId}&load_version=${vid}`;
  }

  async function deleteProfile() {
    if (!confirm('Delete this profile and ALL versions permanently?')) return;
    const { error } = await sb.from('profiles').delete().eq('id', profileId).eq('user_id', currentUser.id);
    if (error) { showToast('Error: ' + error.message); return; }
    window.location.href = 'dashboard.html';
  }

  // ── Helpers ──────────────────────────────────────────────────
  function row(k, v) {
    return `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${esc(String(v||'—'))}</span></div>`;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtTime(ts) {
    const diff=Date.now()-ts, m=Math.floor(diff/60000), h=Math.floor(m/60), d=Math.floor(h/24);
    if(m<2)return'just now'; if(m<60)return`${m}m ago`; if(h<24)return`${h}h ago`; if(d<7)return`${d}d ago`;
    return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  function showToast(msg) {
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    if(toastTimer)clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
  }

  init();
</script>
</body>
</html>
