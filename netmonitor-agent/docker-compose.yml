services:
  spangate-agent:
    image: spangate/netmonitor-agent:latest
    container_name: spangate-agent
    restart: unless-stopped
    # network_mode: host is required on Linux so the container can send ICMP
    # pings to all devices on the local network.
    # Remove this line if running on macOS or Windows Docker Desktop.
    network_mode: host
    # pid: host lets psutil read real host CPU usage (not container-scoped).
    # Remove if running on macOS or Windows Docker Desktop.
    pid: "host"
    volumes:
      # config.yaml is created by setup.sh / setup.ps1 and mounted read-only.
      # Change the left-hand path if you placed config.yaml elsewhere.
      - ./config.yaml:/config/config.yaml:ro
      # Expose host thermal sensors so the agent can report CPU temperature.
      # Safe to remove on non-Linux hosts — the agent degrades gracefully.
      - /sys/class/thermal:/sys/class/thermal:ro
      # ── Self-update support ──────────────────────────────────────────────
      # Docker socket — lets the agent talk to the host Docker daemon.
      # Required for "⚡ Trigger Update" from the dashboard.
      - /var/run/docker.sock:/var/run/docker.sock
      # Compose directory — agent reads docker-compose.yml from here when
      # executing docker compose pull && docker compose up -d.
      - .:/spangate-compose:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
